<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Recognition - Blind Vision</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="container">
        <h1 class="my-4">Text Recognition</h1>

        <div class="alert alert-info">
            <p><strong>Instructions:</strong> Use this tool to convert text in images to speech. You can take a photo with your camera or upload an image.</p>
            <p>Point your camera at text (books, signs, labels) and click "Capture Photo" to analyze the text.</p>
        </div>

        <div class="row">
            <div class="col-md-12">
                <div class="video-container">
                    <video id="video" width="100%" style="max-width: 640px; border: 1px solid #ddd;"></video>
                </div>
                
                <div class="mt-3">
                    <button id="startCamera" class="btn btn-primary">Start Camera</button>
                    <button id="capturePhoto" class="btn btn-success" disabled>Capture Photo</button>
                    <button id="uploadImage" class="btn btn-info">Upload Image</button>
                    <input type="file" id="imageUpload" accept="image/*" style="display: none;">
                    <button id="clearResults" class="btn btn-danger" style="display: none;">Clear Results</button>
                </div>
                
                <div id="loading-spinner" class="text-center mt-3" style="display: none;">
                    <div class="spinner-border text-primary" role="status">
                        <span class="sr-only">Processing...</span>
                    </div>
                    <p>Analyzing text...</p>
                </div>
                
                <div id="results-container" class="mt-3"></div>
                
                <div class="mt-3">
                    <a href="{{ url_for('dashboard') }}" class="btn btn-outline-primary">Back to Dashboard</a>
                </div>
            </div>
        </div>

        <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
        <script>
            // JavaScript functionality for text recognition
            document.addEventListener('DOMContentLoaded', function() {
                const video = document.getElementById('video');
                const startCameraBtn = document.getElementById('startCamera');
                const capturePhotoBtn = document.getElementById('capturePhoto');
                const uploadImageBtn = document.getElementById('uploadImage');
                const imageUploadInput = document.getElementById('imageUpload');
                const resultsContainer = document.getElementById('results-container');
                const loadingSpinner = document.getElementById('loading-spinner');
                const clearResultsBtn = document.getElementById('clearResults');
                
                let stream = null;
                
                // Start camera
                startCameraBtn.addEventListener('click', async function() {
                    try {
                        stream = await navigator.mediaDevices.getUserMedia({ 
                            video: { facingMode: 'environment' }
                        });
                        video.srcObject = stream;
                        video.play();
                        startCameraBtn.disabled = true;
                        capturePhotoBtn.disabled = false;
                    } catch (err) {
                        console.error('Camera access error:', err);
                        alert('Could not access camera: ' + err.message);
                    }
                });
                
                // Capture photo
                capturePhotoBtn.addEventListener('click', function() {
                    // Create canvas to capture frame
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    // Get image data
                    const imageData = canvas.toDataURL('image/jpeg');
                    
                    // Process the image
                    processImage(imageData);
                });
                
                // Image upload
                uploadImageBtn.addEventListener('click', function() {
                    imageUploadInput.click();
                });
                
                imageUploadInput.addEventListener('change', function() {
                    if (this.files && this.files[0]) {
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            processImage(e.target.result);
                        };
                        reader.readAsDataURL(this.files[0]);
                    }
                });
                
                // Process image for text recognition
                function processImage(imageData) {
                    // Show loading spinner
                    loadingSpinner.style.display = 'block';
                    clearResultsBtn.style.display = 'inline';
                    
                    // Create preview of captured image
                    const previewContainer = document.createElement('div');
                    previewContainer.className = 'mt-3 p-2 border rounded';
                    previewContainer.innerHTML = `
                        <h4>Captured Image</h4>
                        <img src="${imageData}" style="max-width: 100%; height: auto;" alt="Captured image">
                    `;
                    
                    // Add to results
                    resultsContainer.innerHTML = '';
                    resultsContainer.appendChild(previewContainer);
                    
                    // Send to backend for processing
                    fetch('/api/text-recognition', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ image: imageData })
                    })
                    .then(response => response.json())
                    .then(data => {
                        // Hide loading spinner
                        loadingSpinner.style.display = 'none';
                        
                        if (data.error) {
                            showError(data.error);
                            return;
                        }
                        
                        // Display results
                        displayTextResults(data);
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        loadingSpinner.style.display = 'none';
                        showError('Failed to process image: ' + error.message);
                    });
                }
                
                // Display text recognition results
                function displayTextResults(data) {
                    const resultDiv = document.createElement('div');
                    resultDiv.className = 'mt-3 p-3 border rounded bg-light';
                    
                    // Check if text was found
                    if (!data.text || data.text.trim() === '') {
                        resultDiv.innerHTML = `
                            <h4>Text Recognition Results</h4>
                            <p class="text-muted">No text detected in the image. Try again with a clearer image or different angle.</p>
                        `;
                        resultsContainer.appendChild(resultDiv);
                        return;
                    }
                    
                    // Display confidence
                    const confidence = data.confidence || 0.7;
                    const confidencePercent = Math.round(confidence * 100);
                    
                    // Build the result HTML
                    resultDiv.innerHTML = `
                        <h4>Text Recognition Results</h4>
                        <p>Confidence: ${confidencePercent}%</p>
                        <div class="p-2 border rounded bg-white">
                            <p>${data.text}</p>
                        </div>
                        <div class="mt-2">
                            <button class="btn btn-primary" id="speak-btn">Speak Text</button>
                        </div>
                    `;
                    
                    resultsContainer.appendChild(resultDiv);
                    
                    // Set up speech synthesis functionality
                    const speakBtn = document.getElementById('speak-btn');
                    if (speakBtn && 'speechSynthesis' in window) {
                        speakBtn.addEventListener('click', function() {
                            const utterance = new SpeechSynthesisUtterance(data.text);
                            window.speechSynthesis.speak(utterance);
                        });
                    } else if (speakBtn) {
                        speakBtn.disabled = true;
                        speakBtn.textContent = 'Speech not supported';
                    }
                }
                
                // Show error message
                function showError(message) {
                    const errorDiv = document.createElement('div');
                    errorDiv.className = 'alert alert-danger mt-3';
                    errorDiv.textContent = message;
                    resultsContainer.appendChild(errorDiv);
                }
                
                // Clear results
                clearResultsBtn.addEventListener('click', function() {
                    resultsContainer.innerHTML = '';
                    clearResultsBtn.style.display = 'none';
                    
                    // Also cancel any ongoing speech
                    if ('speechSynthesis' in window) {
                        window.speechSynthesis.cancel();
                    }
                });
                
                // Clean up on page close
                window.addEventListener('beforeunload', function() {
                    if (stream) {
                        stream.getTracks().forEach(track => track.stop());
                    }
                });
            });
        </script>
    </div>
</body>
</html>
